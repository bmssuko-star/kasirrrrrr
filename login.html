
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Kasir</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="icon" href="icon-192.png" />
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      width: 100%;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <div class="login-box text-center">
    <h2>Login Kasir</h2>
    <input id="username" class="form-control mb-2" placeholder="Username" />
    <input id="password" type="password" class="form-control mb-2" placeholder="Password" />
    <button class="btn btn-danger w-100" onclick="login()">Login</button>
    <div id="loginError" class="alert alert-danger mt-2 d-none">Username atau Password salah!</div>
  </div>

  <script>
    function login() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      if (user === 'admin' && pass === 'admin') {
        localStorage.setItem('isLoggedIn', 'true');
        window.location.href = 'index.html';
      } else {
        document.getElementById('loginError').classList.remove('d-none');
      }
    }
  </script>
</body>
</html>
